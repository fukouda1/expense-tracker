<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#082f23"/>
      <stop offset="45%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="billGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="billShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Coin face gradient (top-down lighting) -->
    <radialGradient id="coinFace" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff7cc"/>
      <stop offset="20%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="80%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <!-- Coin rim (edge) gradient -->
    <linearGradient id="coinRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="40%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <!-- Big coin for magnified -->
    <radialGradient id="coinFaceBig" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="18%" stop-color="#fef3c7"/>
      <stop offset="40%" stop-color="#fde68a"/>
      <stop offset="65%" stop-color="#f59e0b"/>
      <stop offset="85%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>

    <radialGradient id="lensGlass" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.28"/>
      <stop offset="35%" stop-color="#7dd3fc" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#0369a1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0.22"/>
    </radialGradient>
    <radialGradient id="lensVignette" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="15%" stop-color="#e2e8f0"/>
      <stop offset="35%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="70%" stop-color="#64748b"/>
      <stop offset="85%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="ringInner" x1="90%" y1="100%" x2="10%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#64748b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ringHL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="30%" stop-color="#27272a"/>
      <stop offset="70%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="handleShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="gripGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="50%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coinShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <radialGradient id="bgGlow" cx="30%" cy="22%" r="50%">
    <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGlow)"/>

  <!-- ═══ FLYING CASH BILL (smaller, further away — top-right corner) ═══ -->
  <g transform="translate(370,72) rotate(-22) scale(0.62)">
    <path d="M-92,0 C-130,-32 -176,-36 -198,-14 C-174,-22 -130,-6 -108,8Z" fill="white" opacity="0.7"/>
    <path d="M-92,14 C-124,-8 -168,-6 -190,18 C-166,8 -126,18 -104,30Z" fill="white" opacity="0.45"/>
    <path d="M-92,26 C-116,14 -152,20 -170,40 C-150,28 -116,32 -100,44Z" fill="white" opacity="0.25"/>
    <path d="M92,0 C130,-32 176,-36 198,-14 C174,-22 130,-6 108,8Z" fill="white" opacity="0.7"/>
    <path d="M92,14 C124,-8 168,-6 190,18 C166,8 126,18 104,30Z" fill="white" opacity="0.45"/>
    <path d="M92,26 C116,14 152,20 170,40 C150,28 116,32 100,44Z" fill="white" opacity="0.25"/>
    <rect x="-86" y="-48" width="172" height="96" rx="13" fill="url(#billGrad)" filter="url(#shadow)"/>
    <rect x="-86" y="-48" width="172" height="96" rx="13" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.75"/>
    <rect x="-86" y="-48" width="172" height="48" rx="13" fill="url(#billShine)"/>
    <rect x="-72" y="-34" width="144" height="68" rx="8" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="36" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
    <text x="0" y="15" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="44" fill="white" fill-opacity="0.95" text-anchor="middle">₱</text>
    <text x="-58" y="-26" font-family="Arial" font-weight="700" font-size="14" fill="rgba(255,255,255,0.7)">100</text>
    <text x="58" y="40" font-family="Arial" font-weight="700" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="end">100</text>
  </g>

  <!-- ═══ GOLDEN TRACES (more lines, longer path from bill to glass) ═══ -->
  <!-- Wide glow layer -->
  <path d="M330,108 Q290,180 248,268 Q220,320 200,340" fill="none"
        stroke="#f59e0b" stroke-width="16" stroke-linecap="round"
        stroke-dasharray="14,10" opacity="0.12" filter="url(#glow)"/>
  <!-- Trace 1 — main bold -->
  <path d="M332,106 Q292,178 250,266 Q222,318 202,338" fill="none"
        stroke="url(#traceGrad)" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="13,9" filter="url(#softGlow)"/>
  <!-- Trace 2 -->
  <path d="M346,98 Q306,172 264,258 Q236,310 216,330" fill="none"
        stroke="rgba(253,230,138,0.5)" stroke-width="3.5" stroke-linecap="round"
        stroke-dasharray="10,11"/>
  <!-- Trace 3 -->
  <path d="M318,114 Q278,186 236,274 Q208,326 188,346" fill="none"
        stroke="rgba(251,191,36,0.35)" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="8,13"/>
  <!-- Trace 4 -->
  <path d="M356,90 Q316,164 274,250 Q246,302 226,322" fill="none"
        stroke="rgba(253,230,138,0.25)" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="6,14"/>
  <!-- Trace 5 -->
  <path d="M306,122 Q266,194 224,282 Q196,334 176,354" fill="none"
        stroke="rgba(251,191,36,0.18)" stroke-width="1.8" stroke-linecap="round"
        stroke-dasharray="5,15"/>

  <!-- ═══ GOLD COINS along trail (3D coin look) ═══ -->

  <!-- Coin 1 — top, near bill -->
  <g transform="translate(310,148)" filter="url(#coinShadow)">
    <!-- Coin edge (thickness — ellipse behind face) -->
    <ellipse rx="10" ry="10.5" cy="2.5" fill="#92400e"/>
    <ellipse rx="10" ry="10.5" cy="1.5" fill="#b45309"/>
    <!-- Coin face -->
    <circle r="10" fill="url(#coinFace)"/>
    <!-- Rim ring -->
    <circle r="10" fill="none" stroke="url(#coinRim)" stroke-width="1.8"/>
    <!-- Inner ring -->
    <circle r="7.2" fill="none" stroke="rgba(184,139,50,0.5)" stroke-width="0.8"/>
    <!-- ₱ stamped -->
    <text y="4" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="11" fill="#6b3a0a" fill-opacity="0.85" text-anchor="middle">₱</text>
    <!-- Highlight crescent -->
    <path d="M-6,-6 A10,10,0,0,1,6,-6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Coin 2 — middle -->
  <g transform="translate(278,200)" filter="url(#coinShadow)">
    <ellipse rx="9" ry="9.5" cy="2.2" fill="#92400e"/>
    <ellipse rx="9" ry="9.5" cy="1.3" fill="#b45309"/>
    <circle r="9" fill="url(#coinFace)"/>
    <circle r="9" fill="none" stroke="url(#coinRim)" stroke-width="1.5"/>
    <circle r="6.5" fill="none" stroke="rgba(184,139,50,0.45)" stroke-width="0.7"/>
    <text y="3.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="10" fill="#6b3a0a" fill-opacity="0.85" text-anchor="middle">₱</text>
    <path d="M-5.5,-5 A9,9,0,0,1,5.5,-5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Coin 3 — lower -->
  <g transform="translate(252,252)" filter="url(#coinShadow)">
    <ellipse rx="7.5" ry="8" cy="2" fill="#92400e"/>
    <ellipse rx="7.5" ry="8" cy="1.2" fill="#b45309"/>
    <circle r="7.5" fill="url(#coinFace)"/>
    <circle r="7.5" fill="none" stroke="url(#coinRim)" stroke-width="1.3"/>
    <circle r="5.3" fill="none" stroke="rgba(184,139,50,0.4)" stroke-width="0.6"/>
    <text y="3" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="8" fill="#6b3a0a" fill-opacity="0.85" text-anchor="middle">₱</text>
    <path d="M-4.5,-4 A7.5,7.5,0,0,1,4.5,-4" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ═══ MAGNIFYING GLASS ═══ -->

  <!-- Handle -->
  <line x1="284" y1="396" x2="400" y2="464" stroke="#000" stroke-width="54" stroke-linecap="round" opacity="0.3"/>
  <line x1="280" y1="390" x2="398" y2="460" stroke="#0a0a0a" stroke-width="52" stroke-linecap="round"/>
  <line x1="280" y1="390" x2="398" y2="460" stroke="url(#handleGrad)" stroke-width="46" stroke-linecap="round"/>
  <line x1="330" y1="418" x2="338" y2="423" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="340" y1="424" x2="348" y2="429" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="350" y1="430" x2="358" y2="435" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="360" y1="436" x2="368" y2="441" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="370" y1="442" x2="378" y2="447" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="282" y1="394" x2="392" y2="456" stroke="url(#handleShine)" stroke-width="12" stroke-linecap="round"/>
  <circle cx="398" cy="460" r="24" fill="url(#gripGrad)"/>
  <circle cx="398" cy="460" r="24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Gold band -->
  <line x1="274" y1="385" x2="298" y2="399" stroke="#0a0a0a" stroke-width="52" stroke-linecap="butt"/>
  <line x1="274" y1="385" x2="298" y2="399" stroke="url(#bandGrad)" stroke-width="48" stroke-linecap="butt"/>
  <line x1="274" y1="383" x2="292" y2="393" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>

  <!-- Ring -->
  <circle cx="198" cy="315" r="126" fill="rgba(0,0,0,0.35)"/>
  <circle cx="194" cy="310" r="122" fill="none" stroke="#0f172a" stroke-width="9"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringGrad)" stroke-width="48"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringInner)" stroke-width="16"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringHL)" stroke-width="24" stroke-dasharray="190 560" stroke-dashoffset="0" stroke-linecap="round"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="10" stroke-dasharray="70 680" stroke-dashoffset="-300" stroke-linecap="round"/>
  <circle cx="194" cy="310" r="94" fill="none" stroke="#0f172a" stroke-width="4.5"/>
  <circle cx="194" cy="310" r="92" fill="none" stroke="rgba(148,163,184,0.3)" stroke-width="2"/>

  <!-- Lens -->
  <circle cx="194" cy="310" r="90" fill="#0a3d5c" opacity="0.08"/>
  <circle cx="194" cy="310" r="90" fill="url(#lensGlass)"/>
  <circle cx="194" cy="310" r="90" fill="url(#lensVignette)"/>

  <!-- Magnified content inside lens -->
  <clipPath id="lensClip">
    <circle cx="194" cy="310" r="89"/>
  </clipPath>
  <g clip-path="url(#lensClip)">
    <!-- Magnified traces -->
    <path d="M136,268 Q172,306 222,350" fill="none" stroke="#fde68a" stroke-width="7" stroke-linecap="round" stroke-dasharray="16,9" filter="url(#glow)" opacity="0.75"/>
    <path d="M120,286 Q158,322 208,366" fill="none" stroke="rgba(253,230,138,0.45)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="12,11"/>
    <path d="M150,254 Q186,292 236,336" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="9,12"/>
    <path d="M108,300 Q146,336 196,380" fill="none" stroke="rgba(253,230,138,0.2)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7,13"/>
    <path d="M162,242 Q198,280 248,324" fill="none" stroke="rgba(251,191,36,0.15)" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,14"/>

    <!-- Magnified coins (3D look — edge + face + crescent highlight) -->
    <!-- Big coin 1 -->
    <g transform="translate(148,278)" filter="url(#glow)">
      <!-- Thickness edge -->
      <ellipse rx="17" ry="18" cy="4" fill="#78350f"/>
      <ellipse rx="17" ry="18" cy="2.5" fill="#92400e"/>
      <!-- Face -->
      <circle r="17" fill="url(#coinFaceBig)"/>
      <!-- Rim -->
      <circle r="17" fill="none" stroke="#7c4a1a" stroke-width="2.5"/>
      <!-- Inner ring (decorative border) -->
      <circle r="13" fill="none" stroke="rgba(180,130,40,0.45)" stroke-width="1.2"/>
      <!-- Peso sign stamped/embossed -->
      <text y="6" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="17" fill="#5c2d06" fill-opacity="0.8" text-anchor="middle">₱</text>
      <!-- Light stamp offset for emboss effect -->
      <text y="5.5" x="-0.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="17" fill="rgba(255,235,150,0.3)" text-anchor="middle">₱</text>
      <!-- Crescent highlight (top) -->
      <path d="M-10,-11 A17,17,0,0,1,10,-11" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round"/>
      <!-- Tiny specular -->
      <circle cx="-6" cy="-8" r="2.5" fill="white" opacity="0.35"/>
    </g>

    <!-- Big coin 2 -->
    <g transform="translate(184,312)" filter="url(#glow)">
      <ellipse rx="14.5" ry="15.5" cy="3.5" fill="#78350f"/>
      <ellipse rx="14.5" ry="15.5" cy="2" fill="#92400e"/>
      <circle r="14.5" fill="url(#coinFaceBig)"/>
      <circle r="14.5" fill="none" stroke="#7c4a1a" stroke-width="2.2"/>
      <circle r="11" fill="none" stroke="rgba(180,130,40,0.4)" stroke-width="1"/>
      <text y="5.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="15" fill="#5c2d06" fill-opacity="0.8" text-anchor="middle">₱</text>
      <text y="5" x="-0.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="15" fill="rgba(255,235,150,0.3)" text-anchor="middle">₱</text>
      <path d="M-8.5,-9.5 A14.5,14.5,0,0,1,8.5,-9.5" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-5" cy="-7" r="2" fill="white" opacity="0.3"/>
    </g>

    <!-- Big coin 3 -->
    <g transform="translate(216,342)" filter="url(#softGlow)">
      <ellipse rx="12" ry="13" cy="3" fill="#78350f"/>
      <ellipse rx="12" ry="13" cy="1.8" fill="#92400e"/>
      <circle r="12" fill="url(#coinFaceBig)"/>
      <circle r="12" fill="none" stroke="#7c4a1a" stroke-width="1.8"/>
      <circle r="9" fill="none" stroke="rgba(180,130,40,0.35)" stroke-width="0.9"/>
      <text y="4.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="12" fill="#5c2d06" fill-opacity="0.8" text-anchor="middle">₱</text>
      <text y="4" x="-0.4" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="12" fill="rgba(255,235,150,0.25)" text-anchor="middle">₱</text>
      <path d="M-7,-7.5 A12,12,0,0,1,7,-7.5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-4" cy="-6" r="1.8" fill="white" opacity="0.25"/>
    </g>

    <!-- Lens glare inside -->
    <ellipse cx="152" cy="260" rx="32" ry="14" fill="rgba(255,255,255,0.2)" transform="rotate(-32,152,260)"/>
  </g>

  <!-- Glass reflections -->
  <path d="M108,248 a104,104,0,0,1,100,-40" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="9" stroke-linecap="round"/>
  <path d="M124,262 a88,88,0,0,1,64,-30" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="140" cy="242" r="6" fill="white" opacity="0.45" filter="url(#softGlow)"/>
</svg>
