<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="45%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="3" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle diagonal light sweep -->
  <rect width="512" height="512" rx="112" ry="112"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="60"/>

  <!-- ══ MAGNIFYING GLASS ══ -->

  <!-- Handle (thick rounded rod, bottom-right) -->
  <line x1="308" y1="308" x2="420" y2="420"
        stroke="white" stroke-width="52" stroke-linecap="round"
        filter="url(#shadow)"/>
  <!-- Handle shine -->
  <line x1="308" y1="308" x2="410" y2="410"
        stroke="rgba(255,255,255,0.35)" stroke-width="18" stroke-linecap="round"/>

  <!-- Lens outer ring (shadow) -->
  <circle cx="210" cy="210" r="148" fill="rgba(0,0,0,0.25)" filter="url(#shadow)"/>

  <!-- Lens outer ring (white) -->
  <circle cx="210" cy="210" r="148"
          fill="none" stroke="white" stroke-width="46"/>

  <!-- Lens glass fill -->
  <circle cx="210" cy="210" r="120" fill="url(#lensGrad)"/>
  <circle cx="210" cy="210" r="120" fill="rgba(255,255,255,0.06)"/>

  <!-- ══ COIN INSIDE LENS ══ -->
  <!-- Coin shadow -->
  <circle cx="213" cy="216" r="70" fill="rgba(0,0,0,0.2)"/>
  <!-- Coin body -->
  <circle cx="210" cy="210" r="70" fill="url(#coinGrad)"/>
  <!-- Coin inner ring -->
  <circle cx="210" cy="210" r="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Coin shine arc -->
  <path d="M172,178 a52,52,0,0,1,52,-18" fill="none"
        stroke="rgba(255,255,255,0.45)" stroke-width="6" stroke-linecap="round"/>

  <!-- ₱ peso sign -->
  <text x="210" y="232"
        font-family="'Arial Black', 'Georgia', serif"
        font-weight="900"
        font-size="72"
        fill="white"
        text-anchor="middle"
        dominant-baseline="middle">₱</text>

  <!-- Lens glare spot -->
  <ellipse cx="172" cy="168" rx="22" ry="14"
           fill="rgba(255,255,255,0.4)" transform="rotate(-35,172,168)"/>

  <!-- Small sparkles around lens -->
  <g fill="white" opacity="0.7">
    <circle cx="90"  cy="108" r="5"/>
    <circle cx="78"  cy="94"  r="3"/>
    <circle cx="104" cy="92"  r="3"/>
    <circle cx="380" cy="110" r="4"/>
    <circle cx="394" cy="98"  r="2.5"/>
  </g>
</svg>
