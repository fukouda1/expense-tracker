<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark teal background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2018"/>
      <stop offset="50%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <!-- Bill gradient -->
    <linearGradient id="billGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <!-- Gold traces -->
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Lens glass -->
    <radialGradient id="lensGlass" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#bfecff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#7dd3fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.08"/>
    </radialGradient>
    <!-- Chrome ring -->
    <linearGradient id="ringGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="30%" stop-color="#e2e8f0"/>
      <stop offset="60%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <!-- Ring highlight -->
    <linearGradient id="ringHL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Handle -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="40%" stop-color="#44403c"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <!-- Gold band -->
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <radialGradient id="bgGlow" cx="35%" cy="28%" r="55%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGlow)"/>

  <!-- ═══ FLYING CASH BILL (centered upper area) ═══ -->
  <g transform="translate(300,120) rotate(-15) scale(0.85)">
    <!-- Wings — simplified to 3 layers per side -->
    <path d="M-95,2 C-132,-28 -178,-32 -200,-12 C-176,-20 -132,-4 -110,10Z" fill="white" opacity="0.65"/>
    <path d="M-95,16 C-126,-6 -170,-8 -192,14 C-168,6 -128,16 -106,28Z" fill="white" opacity="0.50"/>
    <path d="M-95,28 C-118,12 -156,18 -174,38 C-152,26 -118,30 -102,42Z" fill="white" opacity="0.35"/>
    <path d="M95,2 C132,-28 178,-32 200,-12 C176,-20 132,-4 110,10Z" fill="white" opacity="0.65"/>
    <path d="M95,16 C126,-6 170,-8 192,14 C168,6 128,16 106,28Z" fill="white" opacity="0.50"/>
    <path d="M95,28 C118,12 156,18 174,38 C152,26 118,30 102,42Z" fill="white" opacity="0.35"/>

    <!-- Bill body -->
    <rect x="-88" y="-50" width="176" height="100" rx="14"
          fill="url(#billGrad)" filter="url(#shadow)"/>
    <rect x="-88" y="-50" width="176" height="100" rx="14"
          fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.7"/>
    <rect x="-74" y="-36" width="148" height="72" rx="9"
          fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Center ₱ — BIGGER & bolder -->
    <circle cx="0" cy="0" r="38" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="0" y="16"
          font-family="'Arial Black',Arial,sans-serif"
          font-weight="900" font-size="44"
          fill="white" text-anchor="middle">₱</text>
    <!-- Denomination corners -->
    <text x="-60" y="-28" font-family="Arial" font-weight="700" font-size="14"
          fill="rgba(255,255,255,0.75)">100</text>
    <text x="60" y="42" font-family="Arial" font-weight="700" font-size="14"
          fill="rgba(255,255,255,0.75)" text-anchor="end">100</text>
  </g>

  <!-- ═══ GOLDEN TRACES — simplified to 3 bold lines ═══ -->
  <path d="M268,160 Q238,220 210,290" fill="none"
        stroke="url(#traceGrad)" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="12,9" filter="url(#glow)"/>
  <path d="M284,152 Q254,214 226,282" fill="none"
        stroke="rgba(253,230,138,0.55)" stroke-width="3.5" stroke-linecap="round"
        stroke-dasharray="9,11"/>
  <path d="M252,168 Q222,228 194,298" fill="none"
        stroke="rgba(251,191,36,0.35)" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="7,12"/>

  <!-- Glowing dots — fewer, bolder -->
  <circle cx="258" cy="186" r="6" fill="#fde68a" opacity="0.9" filter="url(#glow)"/>
  <circle cx="244" cy="216" r="5.5" fill="#fbbf24" opacity="0.8" filter="url(#glow)"/>
  <circle cx="230" cy="248" r="5" fill="#f59e0b" opacity="0.65"/>

  <!-- ═══ MAGNIFYING GLASS (more centered, bolder ring) ═══ -->

  <!-- Handle -->
  <line x1="280" y1="392" x2="390" y2="452"
        stroke="#1c1917" stroke-width="48" stroke-linecap="round"/>
  <line x1="280" y1="392" x2="390" y2="452"
        stroke="url(#handleGrad)" stroke-width="42" stroke-linecap="round"/>
  <!-- Gold band -->
  <line x1="276" y1="388" x2="296" y2="400"
        stroke="url(#bandGrad)" stroke-width="46" stroke-linecap="butt"/>
  <!-- Handle shine -->
  <line x1="278" y1="396" x2="382" y2="450"
        stroke="rgba(255,255,255,0.2)" stroke-width="10" stroke-linecap="round"/>

  <!-- Ring — thicker, higher contrast -->
  <circle cx="195" cy="310" r="122" fill="rgba(0,0,0,0.3)"/>
  <circle cx="192" cy="307" r="119" fill="none" stroke="#0f172a" stroke-width="7"/>
  <circle cx="192" cy="307" r="116" fill="none"
          stroke="url(#ringGrad)" stroke-width="44"/>
  <!-- Ring highlight arc -->
  <circle cx="192" cy="307" r="116" fill="none"
          stroke="url(#ringHL)" stroke-width="20"
          stroke-dasharray="182 548" stroke-dashoffset="0"
          stroke-linecap="round"/>
  <!-- Inner dark edge -->
  <circle cx="192" cy="307" r="94" fill="none" stroke="#0f172a" stroke-width="3.5"/>

  <!-- Lens glass -->
  <circle cx="192" cy="307" r="91" fill="url(#lensGlass)"/>

  <!-- Traces magnified inside lens -->
  <clipPath id="lensClip">
    <circle cx="192" cy="307" r="90"/>
  </clipPath>
  <g clip-path="url(#lensClip)">
    <path d="M138,270 Q170,304 216,344" fill="none"
          stroke="#fde68a" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="14,9" filter="url(#glow)" opacity="0.9"/>
    <path d="M124,286 Q158,320 204,360" fill="none"
          stroke="rgba(253,230,138,0.55)" stroke-width="4" stroke-linecap="round"
          stroke-dasharray="10,11"/>
    <path d="M152,258 Q184,292 230,332" fill="none"
          stroke="rgba(251,191,36,0.4)" stroke-width="3" stroke-linecap="round"
          stroke-dasharray="8,12"/>
    <!-- Magnified dots -->
    <circle cx="150" cy="280" r="9" fill="#fde68a" opacity="0.85" filter="url(#glow)"/>
    <circle cx="174" cy="304" r="8" fill="#fbbf24" opacity="0.75" filter="url(#glow)"/>
    <circle cx="198" cy="326" r="7" fill="#f59e0b" opacity="0.6"/>
    <!-- Lens glare -->
    <ellipse cx="155" cy="264" rx="26" ry="12"
             fill="rgba(255,255,255,0.2)" transform="rotate(-30,155,264)"/>
  </g>

  <!-- Glass glare arc -->
  <path d="M112,250 a100,100,0,0,1,92,-36"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="7"
        stroke-linecap="round"/>
</svg>
