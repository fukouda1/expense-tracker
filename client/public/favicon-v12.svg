<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#082f23"/>
      <stop offset="45%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="billGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="billShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Coin — flat front-facing circle style -->
    <!-- Outer ring (dark brown border) -->
    <!-- Middle ring (orange-gold) -->
    <!-- Inner face (bright yellow) -->
    <radialGradient id="coinOuter" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#e6a100"/>
      <stop offset="60%" stop-color="#c68600"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>
    <radialGradient id="coinMiddle" cx="48%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ffc107"/>
      <stop offset="50%" stop-color="#e6a100"/>
      <stop offset="100%" stop-color="#c68600"/>
    </radialGradient>
    <radialGradient id="coinInner" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="30%" stop-color="#ffe082"/>
      <stop offset="70%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#e6a100"/>
    </radialGradient>
    <!-- Big versions for magnified -->
    <radialGradient id="coinOuterBig" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="60%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#7a5a0a"/>
    </radialGradient>
    <radialGradient id="coinMiddleBig" cx="48%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ffca28"/>
      <stop offset="50%" stop-color="#e6a100"/>
      <stop offset="100%" stop-color="#c68600"/>
    </radialGradient>
    <radialGradient id="coinInnerBig" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="25%" stop-color="#fff59d"/>
      <stop offset="55%" stop-color="#ffc107"/>
      <stop offset="85%" stop-color="#e6a100"/>
      <stop offset="100%" stop-color="#c68600"/>
    </radialGradient>

    <radialGradient id="lensGlass" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.28"/>
      <stop offset="35%" stop-color="#7dd3fc" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#0369a1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0.22"/>
    </radialGradient>
    <radialGradient id="lensVignette" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="15%" stop-color="#e2e8f0"/>
      <stop offset="35%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="70%" stop-color="#64748b"/>
      <stop offset="85%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="ringInner" x1="90%" y1="100%" x2="10%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#64748b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ringHL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="30%" stop-color="#27272a"/>
      <stop offset="70%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="handleShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="gripGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="50%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coinShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <radialGradient id="bgGlow" cx="30%" cy="22%" r="50%">
    <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGlow)"/>

  <!-- ═══ BILL ═══ -->
  <g transform="translate(362,68) rotate(-20) scale(0.58)" filter="url(#shadow)">
    <path d="M-90,0 C-126,-30 -170,-34 -192,-14 C-170,-20 -128,-6 -106,8Z" fill="white" opacity="0.7"/>
    <path d="M-90,14 C-120,-6 -164,-4 -186,18 C-162,8 -122,18 -100,30Z" fill="white" opacity="0.48"/>
    <path d="M-90,26 C-114,14 -148,20 -166,38 C-146,28 -114,32 -98,42Z" fill="white" opacity="0.28"/>
    <path d="M90,0 C126,-30 170,-34 192,-14 C170,-20 128,-6 106,8Z" fill="white" opacity="0.7"/>
    <path d="M90,14 C120,-6 164,-4 186,18 C162,8 122,18 100,30Z" fill="white" opacity="0.48"/>
    <path d="M90,26 C114,14 148,20 166,38 C146,28 114,32 98,42Z" fill="white" opacity="0.28"/>
    <rect x="-86" y="-48" width="172" height="96" rx="13" fill="url(#billGrad)"/>
    <rect x="-86" y="-48" width="172" height="96" rx="13" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.75"/>
    <rect x="-86" y="-48" width="172" height="48" rx="13" fill="url(#billShine)"/>
    <rect x="-72" y="-34" width="144" height="68" rx="8" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="34" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
    <text x="0" y="14" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="42" fill="white" fill-opacity="0.95" text-anchor="middle">₱</text>
    <text x="-58" y="-26" font-family="Arial" font-weight="700" font-size="14" fill="rgba(255,255,255,0.7)">100</text>
    <text x="58" y="40" font-family="Arial" font-weight="700" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="end">100</text>
  </g>

  <!-- ═══ TRACE ═══ -->
  <path d="M326,102 Q296,168 262,244 Q234,296 212,324" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round" stroke-dasharray="15,10" opacity="0.14" filter="url(#glow)"/>
  <path d="M326,102 Q296,168 262,244 Q234,296 212,324" fill="none" stroke="url(#traceGrad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="14,9" filter="url(#softGlow)"/>
  <path d="M338,94 Q308,162 274,238 Q246,290 224,318" fill="none" stroke="rgba(253,230,138,0.35)" stroke-width="3" stroke-linecap="round" stroke-dasharray="10,12"/>

  <!-- ═══ FLAT FACE-UP COINS along trace (like the reference image) ═══ -->

  <!-- Coin 1 — near bill, largest -->
  <g transform="translate(308,140)" filter="url(#coinShadow)">
    <!-- Outer brown ring -->
    <circle r="14" fill="url(#coinOuter)"/>
    <circle r="14" fill="none" stroke="#7a5a0a" stroke-width="1.8"/>
    <!-- Middle orange-gold ring -->
    <circle r="11.5" fill="url(#coinMiddle)"/>
    <!-- Inner bright face -->
    <circle r="9" fill="url(#coinInner)"/>
    <!-- ₱ sign -->
    <text y="4" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="12" fill="#a07818" text-anchor="middle">₱</text>
    <!-- Highlight crescent (top-left) -->
    <path d="M-5,-8 A9,9,0,0,1,7,-5" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Small specular dot -->
    <circle cx="-3" cy="-5" r="2" fill="white" opacity="0.4"/>
  </g>

  <!-- Coin 2 — mid-trace -->
  <g transform="translate(280,200)" filter="url(#coinShadow)">
    <circle r="12" fill="url(#coinOuter)"/>
    <circle r="12" fill="none" stroke="#7a5a0a" stroke-width="1.5"/>
    <circle r="9.8" fill="url(#coinMiddle)"/>
    <circle r="7.5" fill="url(#coinInner)"/>
    <text y="3.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="10" fill="#a07818" text-anchor="middle">₱</text>
    <path d="M-4,-6.5 A7.5,7.5,0,0,1,6,-4" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-2.5" cy="-4" r="1.8" fill="white" opacity="0.35"/>
  </g>

  <!-- Coin 3 — near glass, smallest -->
  <g transform="translate(252,256)" filter="url(#coinShadow)">
    <circle r="10" fill="url(#coinOuter)"/>
    <circle r="10" fill="none" stroke="#7a5a0a" stroke-width="1.3"/>
    <circle r="8" fill="url(#coinMiddle)"/>
    <circle r="6.2" fill="url(#coinInner)"/>
    <text y="3" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="8" fill="#a07818" text-anchor="middle">₱</text>
    <path d="M-3,-5.2 A6.2,6.2,0,0,1,5,-3" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="-2" cy="-3.2" r="1.5" fill="white" opacity="0.3"/>
  </g>

  <!-- ═══ MAGNIFYING GLASS ═══ -->

  <!-- Handle -->
  <line x1="284" y1="396" x2="400" y2="464" stroke="#000" stroke-width="54" stroke-linecap="round" opacity="0.3"/>
  <line x1="280" y1="390" x2="398" y2="460" stroke="#0a0a0a" stroke-width="52" stroke-linecap="round"/>
  <line x1="280" y1="390" x2="398" y2="460" stroke="url(#handleGrad)" stroke-width="46" stroke-linecap="round"/>
  <line x1="330" y1="418" x2="338" y2="423" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="340" y1="424" x2="348" y2="429" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="350" y1="430" x2="358" y2="435" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="360" y1="436" x2="368" y2="441" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="370" y1="442" x2="378" y2="447" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="282" y1="394" x2="392" y2="456" stroke="url(#handleShine)" stroke-width="12" stroke-linecap="round"/>
  <circle cx="398" cy="460" r="24" fill="url(#gripGrad)"/>
  <circle cx="398" cy="460" r="24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Gold band -->
  <line x1="274" y1="385" x2="298" y2="399" stroke="#0a0a0a" stroke-width="52" stroke-linecap="butt"/>
  <line x1="274" y1="385" x2="298" y2="399" stroke="url(#bandGrad)" stroke-width="48" stroke-linecap="butt"/>
  <line x1="274" y1="383" x2="292" y2="393" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>

  <!-- Ring -->
  <circle cx="198" cy="315" r="126" fill="rgba(0,0,0,0.35)"/>
  <circle cx="194" cy="310" r="122" fill="none" stroke="#0f172a" stroke-width="9"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringGrad)" stroke-width="48"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringInner)" stroke-width="16"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringHL)" stroke-width="24" stroke-dasharray="190 560" stroke-dashoffset="0" stroke-linecap="round"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="10" stroke-dasharray="70 680" stroke-dashoffset="-300" stroke-linecap="round"/>
  <circle cx="194" cy="310" r="94" fill="none" stroke="#0f172a" stroke-width="4.5"/>
  <circle cx="194" cy="310" r="92" fill="none" stroke="rgba(148,163,184,0.3)" stroke-width="2"/>

  <!-- Lens -->
  <circle cx="194" cy="310" r="90" fill="#0a3d5c" opacity="0.08"/>
  <circle cx="194" cy="310" r="90" fill="url(#lensGlass)"/>
  <circle cx="194" cy="310" r="90" fill="url(#lensVignette)"/>

  <!-- ═══ MAGNIFIED HERO COINS — flat face-up circles ═══ -->
  <clipPath id="lensClip">
    <circle cx="194" cy="310" r="89"/>
  </clipPath>
  <g clip-path="url(#lensClip)">
    <!-- Magnified trace -->
    <path d="M144,260 Q172,290 210,336" fill="none" stroke="#fde68a" stroke-width="8" stroke-linecap="round" stroke-dasharray="16,9" filter="url(#glow)" opacity="0.65"/>
    <path d="M156,248 Q184,278 222,324" fill="none" stroke="rgba(253,230,138,0.3)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10,12"/>

    <!-- HERO COIN 1 — biggest -->
    <g transform="translate(158,280)" filter="url(#glow)">
      <circle r="28" fill="url(#coinOuterBig)"/>
      <circle r="28" fill="none" stroke="#6b4f0a" stroke-width="3"/>
      <circle r="23" fill="url(#coinMiddleBig)"/>
      <circle r="18" fill="url(#coinInnerBig)"/>
      <!-- ₱ sign — bold and clear -->
      <text y="7" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="22" fill="#a07818" text-anchor="middle">₱</text>
      <!-- Highlight crescent -->
      <path d="M-10,-14 A18,18,0,0,1,14,-8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
      <!-- Specular -->
      <circle cx="-6" cy="-10" r="4" fill="white" opacity="0.4"/>
      <!-- Bottom-left soft glow -->
      <path d="M-12,10 A18,18,0,0,1,-16,4" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- HERO COIN 2 -->
    <g transform="translate(208,322)" filter="url(#glow)">
      <circle r="22" fill="url(#coinOuterBig)"/>
      <circle r="22" fill="none" stroke="#6b4f0a" stroke-width="2.5"/>
      <circle r="18" fill="url(#coinMiddleBig)"/>
      <circle r="14" fill="url(#coinInnerBig)"/>
      <text y="5.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="17" fill="#a07818" text-anchor="middle">₱</text>
      <path d="M-8,-11 A14,14,0,0,1,10,-6" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="-4.5" cy="-8" r="3" fill="white" opacity="0.35"/>
    </g>

    <!-- HERO COIN 3 -->
    <g transform="translate(244,354)" filter="url(#softGlow)">
      <circle r="17" fill="url(#coinOuterBig)"/>
      <circle r="17" fill="none" stroke="#6b4f0a" stroke-width="2"/>
      <circle r="14" fill="url(#coinMiddleBig)"/>
      <circle r="10.5" fill="url(#coinInnerBig)"/>
      <text y="4.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="13" fill="#a07818" text-anchor="middle">₱</text>
      <path d="M-6,-8 A10.5,10.5,0,0,1,8,-5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="-3.5" cy="-6" r="2.5" fill="white" opacity="0.3"/>
    </g>

    <!-- Lens glare -->
    <ellipse cx="150" cy="258" rx="30" ry="13" fill="rgba(255,255,255,0.2)" transform="rotate(-32,150,258)"/>
  </g>

  <!-- Glass reflections -->
  <path d="M108,248 a104,104,0,0,1,100,-40" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="9" stroke-linecap="round"/>
  <path d="M124,262 a88,88,0,0,1,64,-30" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="140" cy="242" r="6" fill="white" opacity="0.45" filter="url(#softGlow)"/>
</svg>
