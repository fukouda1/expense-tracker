<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#082f23"/>
      <stop offset="45%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="billGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="billShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Gold coin gradient -->
    <radialGradient id="coinGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="30%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="85%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <!-- Bigger coin gradient for magnified -->
    <radialGradient id="coinGradBig" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="25%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="80%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>

    <radialGradient id="lensGlass" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.28"/>
      <stop offset="35%" stop-color="#7dd3fc" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#0369a1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0.22"/>
    </radialGradient>
    <radialGradient id="lensVignette" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="15%" stop-color="#e2e8f0"/>
      <stop offset="35%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="70%" stop-color="#64748b"/>
      <stop offset="85%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="ringInner" x1="90%" y1="100%" x2="10%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#64748b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ringHL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="30%" stop-color="#27272a"/>
      <stop offset="70%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="handleShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="gripGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="50%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coinShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <radialGradient id="bgGlow" cx="30%" cy="22%" r="50%">
    <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGlow)"/>

  <!-- ═══ FLYING CASH BILL ═══ -->
  <g transform="translate(306,126) rotate(-18) scale(0.88)">
    <path d="M-92,0 C-130,-32 -176,-36 -198,-14 C-174,-22 -130,-6 -108,8Z" fill="white" opacity="0.7"/>
    <path d="M-92,14 C-124,-8 -168,-6 -190,18 C-166,8 -126,18 -104,30Z" fill="white" opacity="0.5"/>
    <path d="M-92,26 C-116,14 -152,20 -170,40 C-150,28 -116,32 -100,44Z" fill="white" opacity="0.3"/>
    <path d="M92,0 C130,-32 176,-36 198,-14 C174,-22 130,-6 108,8Z" fill="white" opacity="0.7"/>
    <path d="M92,14 C124,-8 168,-6 190,18 C166,8 126,18 104,30Z" fill="white" opacity="0.5"/>
    <path d="M92,26 C116,14 152,20 170,40 C150,28 116,32 100,44Z" fill="white" opacity="0.3"/>
    <rect x="-86" y="-48" width="172" height="96" rx="13" fill="url(#billGrad)" filter="url(#shadow)"/>
    <rect x="-86" y="-48" width="172" height="96" rx="13" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.75"/>
    <rect x="-86" y="-48" width="172" height="48" rx="13" fill="url(#billShine)"/>
    <rect x="-72" y="-34" width="144" height="68" rx="8" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="36" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
    <text x="0" y="15" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="44" fill="white" fill-opacity="0.95" text-anchor="middle">₱</text>
    <text x="-58" y="-26" font-family="Arial" font-weight="700" font-size="14" fill="rgba(255,255,255,0.7)">100</text>
    <text x="58" y="40" font-family="Arial" font-weight="700" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="end">100</text>
  </g>

  <!-- ═══ GOLDEN TRACES with COINS ═══ -->
  <path d="M272,162 Q240,222 212,292" fill="none" stroke="#f59e0b" stroke-width="14" stroke-linecap="round" stroke-dasharray="14,10" opacity="0.15" filter="url(#glow)"/>
  <path d="M272,162 Q240,222 212,292" fill="none" stroke="url(#traceGrad)" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="13,9" filter="url(#softGlow)"/>
  <path d="M288,154 Q256,216 228,284" fill="none" stroke="rgba(253,230,138,0.55)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="10,11"/>
  <path d="M256,170 Q224,232 196,300" fill="none" stroke="rgba(251,191,36,0.35)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8,13"/>

  <!-- Gold coins along trail (outside lens) -->
  <!-- Coin 1 — largest, closest to bill -->
  <g transform="translate(262,184)" filter="url(#coinShadow)">
    <circle r="11" fill="url(#coinGrad)"/>
    <circle r="11" fill="none" stroke="#b45309" stroke-width="1.5"/>
    <circle r="8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
    <text y="4.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="12" fill="#78350f" text-anchor="middle">₱</text>
    <!-- Coin shine -->
    <ellipse cx="-3" cy="-4" rx="5" ry="3" fill="rgba(255,255,255,0.35)" transform="rotate(-20)"/>
  </g>
  <!-- Coin 2 -->
  <g transform="translate(248,216)" filter="url(#coinShadow)">
    <circle r="9.5" fill="url(#coinGrad)"/>
    <circle r="9.5" fill="none" stroke="#b45309" stroke-width="1.2"/>
    <circle r="7" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
    <text y="4" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="10" fill="#78350f" text-anchor="middle">₱</text>
    <ellipse cx="-2.5" cy="-3.5" rx="4" ry="2.5" fill="rgba(255,255,255,0.3)" transform="rotate(-20)"/>
  </g>
  <!-- Coin 3 — smallest -->
  <g transform="translate(234,248)" filter="url(#coinShadow)">
    <circle r="8" fill="url(#coinGrad)"/>
    <circle r="8" fill="none" stroke="#b45309" stroke-width="1"/>
    <circle r="5.8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
    <text y="3.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="9" fill="#78350f" text-anchor="middle">₱</text>
    <ellipse cx="-2" cy="-3" rx="3.5" ry="2" fill="rgba(255,255,255,0.25)" transform="rotate(-20)"/>
  </g>

  <!-- ═══ MAGNIFYING GLASS ═══ -->

  <!-- Handle -->
  <line x1="284" y1="396" x2="400" y2="464" stroke="#000" stroke-width="54" stroke-linecap="round" opacity="0.3"/>
  <line x1="280" y1="390" x2="398" y2="460" stroke="#0a0a0a" stroke-width="52" stroke-linecap="round"/>
  <line x1="280" y1="390" x2="398" y2="460" stroke="url(#handleGrad)" stroke-width="46" stroke-linecap="round"/>
  <line x1="330" y1="418" x2="338" y2="423" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="340" y1="424" x2="348" y2="429" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="350" y1="430" x2="358" y2="435" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="360" y1="436" x2="368" y2="441" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="370" y1="442" x2="378" y2="447" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="282" y1="394" x2="392" y2="456" stroke="url(#handleShine)" stroke-width="12" stroke-linecap="round"/>
  <circle cx="398" cy="460" r="24" fill="url(#gripGrad)"/>
  <circle cx="398" cy="460" r="24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Gold band -->
  <line x1="274" y1="385" x2="298" y2="399" stroke="#0a0a0a" stroke-width="52" stroke-linecap="butt"/>
  <line x1="274" y1="385" x2="298" y2="399" stroke="url(#bandGrad)" stroke-width="48" stroke-linecap="butt"/>
  <line x1="274" y1="383" x2="292" y2="393" stroke="rgba(255,255,255,0.3)" stroke-width="8" stroke-linecap="round"/>

  <!-- Ring -->
  <circle cx="198" cy="315" r="126" fill="rgba(0,0,0,0.35)"/>
  <circle cx="194" cy="310" r="122" fill="none" stroke="#0f172a" stroke-width="9"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringGrad)" stroke-width="48"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringInner)" stroke-width="16"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="url(#ringHL)" stroke-width="24" stroke-dasharray="190 560" stroke-dashoffset="0" stroke-linecap="round"/>
  <circle cx="194" cy="310" r="118" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="10" stroke-dasharray="70 680" stroke-dashoffset="-300" stroke-linecap="round"/>
  <circle cx="194" cy="310" r="94" fill="none" stroke="#0f172a" stroke-width="4.5"/>
  <circle cx="194" cy="310" r="92" fill="none" stroke="rgba(148,163,184,0.3)" stroke-width="2"/>

  <!-- Lens -->
  <circle cx="194" cy="310" r="90" fill="#0a3d5c" opacity="0.08"/>
  <circle cx="194" cy="310" r="90" fill="url(#lensGlass)"/>
  <circle cx="194" cy="310" r="90" fill="url(#lensVignette)"/>

  <!-- Magnified content inside lens -->
  <clipPath id="lensClip">
    <circle cx="194" cy="310" r="89"/>
  </clipPath>
  <g clip-path="url(#lensClip)">
    <!-- Magnified traces -->
    <path d="M136,268 Q172,306 222,350" fill="none" stroke="#fde68a" stroke-width="7.5" stroke-linecap="round" stroke-dasharray="16,9" filter="url(#glow)" opacity="0.8"/>
    <path d="M120,286 Q158,322 208,366" fill="none" stroke="rgba(253,230,138,0.5)" stroke-width="5" stroke-linecap="round" stroke-dasharray="12,11"/>
    <path d="M150,254 Q186,292 236,336" fill="none" stroke="rgba(251,191,36,0.35)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="9,12"/>

    <!-- Magnified gold coins (bigger versions) -->
    <!-- Coin 1 — big -->
    <g transform="translate(148,278)" filter="url(#glow)">
      <circle r="18" fill="url(#coinGradBig)"/>
      <circle r="18" fill="none" stroke="#92400e" stroke-width="2"/>
      <circle r="14" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
      <text y="6" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="18" fill="#78350f" text-anchor="middle">₱</text>
      <ellipse cx="-5" cy="-7" rx="8" ry="4.5" fill="rgba(255,255,255,0.38)" transform="rotate(-22)"/>
    </g>
    <!-- Coin 2 -->
    <g transform="translate(180,310)" filter="url(#glow)">
      <circle r="15" fill="url(#coinGradBig)"/>
      <circle r="15" fill="none" stroke="#92400e" stroke-width="1.8"/>
      <circle r="11.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.9"/>
      <text y="5.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="15" fill="#78350f" text-anchor="middle">₱</text>
      <ellipse cx="-4" cy="-6" rx="6.5" ry="3.5" fill="rgba(255,255,255,0.32)" transform="rotate(-22)"/>
    </g>
    <!-- Coin 3 -->
    <g transform="translate(208,338)" filter="url(#softGlow)">
      <circle r="12.5" fill="url(#coinGradBig)"/>
      <circle r="12.5" fill="none" stroke="#92400e" stroke-width="1.5"/>
      <circle r="9.5" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
      <text y="4.5" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="13" fill="#78350f" text-anchor="middle">₱</text>
      <ellipse cx="-3.5" cy="-5" rx="5.5" ry="3" fill="rgba(255,255,255,0.28)" transform="rotate(-22)"/>
    </g>

    <!-- Lens glare inside -->
    <ellipse cx="152" cy="260" rx="32" ry="14" fill="rgba(255,255,255,0.22)" transform="rotate(-32,152,260)"/>
  </g>

  <!-- Glass reflections -->
  <path d="M108,248 a104,104,0,0,1,100,-40" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="9" stroke-linecap="round"/>
  <path d="M124,262 a88,88,0,0,1,64,-30" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="140" cy="242" r="6" fill="white" opacity="0.45" filter="url(#softGlow)"/>
</svg>
