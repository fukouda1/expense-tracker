<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#082f23"/>
      <stop offset="45%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <!-- Bill gradient -->
    <linearGradient id="billGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <!-- Gold -->
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Lens glass -->
    <radialGradient id="lensGlass" cx="32%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#d4f0ff" stop-opacity="0.30"/>
      <stop offset="50%" stop-color="#7dd3fc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0.18"/>
    </radialGradient>
    <!-- Chrome ring -->
    <linearGradient id="ringGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="25%" stop-color="#e2e8f0"/>
      <stop offset="55%" stop-color="#94a3b8"/>
      <stop offset="85%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <!-- Ring highlight -->
    <linearGradient id="ringHL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Handle -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="40%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <!-- Gold band -->
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <!-- Bill inner shadow -->
    <linearGradient id="billShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <radialGradient id="bgGlow" cx="30%" cy="22%" r="50%">
    <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGlow)"/>

  <!-- ═══ FLYING CASH BILL ═══ -->
  <g transform="translate(306,126) rotate(-18) scale(0.88)">
    <!-- Wings — 3 layers, more dynamic curves -->
    <path d="M-92,0 C-130,-32 -176,-36 -198,-14 C-174,-22 -130,-6 -108,8Z" fill="white" opacity="0.7"/>
    <path d="M-92,14 C-124,-8 -168,-6 -190,18 C-166,8 -126,18 -104,30Z" fill="white" opacity="0.5"/>
    <path d="M-92,26 C-116,14 -152,20 -170,40 C-150,28 -116,32 -100,44Z" fill="white" opacity="0.3"/>
    <path d="M92,0 C130,-32 176,-36 198,-14 C174,-22 130,-6 108,8Z" fill="white" opacity="0.7"/>
    <path d="M92,14 C124,-8 168,-6 190,18 C166,8 126,18 104,30Z" fill="white" opacity="0.5"/>
    <path d="M92,26 C116,14 152,20 170,40 C150,28 116,32 100,44Z" fill="white" opacity="0.3"/>

    <!-- Bill body -->
    <rect x="-86" y="-48" width="172" height="96" rx="13"
          fill="url(#billGrad)" filter="url(#shadow)"/>
    <!-- Gold border -->
    <rect x="-86" y="-48" width="172" height="96" rx="13"
          fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.75"/>
    <!-- Shine overlay on top half -->
    <rect x="-86" y="-48" width="172" height="48" rx="13"
          fill="url(#billShine)"/>
    <!-- Inner frame -->
    <rect x="-72" y="-34" width="144" height="68" rx="8"
          fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <!-- Center medallion -->
    <circle cx="0" cy="0" r="36" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
    <!-- ₱ symbol — large and crisp -->
    <text x="0" y="15"
          font-family="'Arial Black',Arial,sans-serif"
          font-weight="900" font-size="44"
          fill="white" fill-opacity="0.95" text-anchor="middle">₱</text>
    <!-- Denomination corners -->
    <text x="-58" y="-26" font-family="Arial" font-weight="700" font-size="14"
          fill="rgba(255,255,255,0.7)">100</text>
    <text x="58" y="40" font-family="Arial" font-weight="700" font-size="14"
          fill="rgba(255,255,255,0.7)" text-anchor="end">100</text>
  </g>

  <!-- ═══ GOLDEN TRACES — 3 bold arcing lines ═══ -->
  <!-- Subtle wide glow behind all traces -->
  <path d="M272,162 Q240,222 212,292" fill="none"
        stroke="#f59e0b" stroke-width="14" stroke-linecap="round"
        stroke-dasharray="14,10" opacity="0.15" filter="url(#glow)"/>
  <!-- Main trace -->
  <path d="M272,162 Q240,222 212,292" fill="none"
        stroke="url(#traceGrad)" stroke-width="5.5" stroke-linecap="round"
        stroke-dasharray="13,9" filter="url(#softGlow)"/>
  <!-- Trace 2 -->
  <path d="M288,154 Q256,216 228,284" fill="none"
        stroke="rgba(253,230,138,0.55)" stroke-width="3.5" stroke-linecap="round"
        stroke-dasharray="10,11"/>
  <!-- Trace 3 -->
  <path d="M256,170 Q224,232 196,300" fill="none"
        stroke="rgba(251,191,36,0.35)" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="8,13"/>

  <!-- Glowing dots along trail -->
  <circle cx="262" cy="184" r="7" fill="#fde68a" opacity="0.95" filter="url(#glow)"/>
  <circle cx="248" cy="214" r="6" fill="#fbbf24" opacity="0.8" filter="url(#glow)"/>
  <circle cx="234" cy="246" r="5" fill="#f59e0b" opacity="0.65" filter="url(#softGlow)"/>

  <!-- ═══ MAGNIFYING GLASS ═══ -->

  <!-- Handle — darker, more contrast -->
  <line x1="280" y1="390" x2="395" y2="458"
        stroke="#0f0f0f" stroke-width="50" stroke-linecap="round"/>
  <line x1="280" y1="390" x2="395" y2="458"
        stroke="url(#handleGrad)" stroke-width="44" stroke-linecap="round"/>
  <!-- Gold band at junction -->
  <line x1="275" y1="386" x2="296" y2="398"
        stroke="url(#bandGrad)" stroke-width="48" stroke-linecap="butt"/>
  <!-- Handle shine streak -->
  <line x1="282" y1="394" x2="388" y2="454"
        stroke="rgba(255,255,255,0.18)" stroke-width="10" stroke-linecap="round"/>
  <!-- Subtle edge highlight -->
  <line x1="284" y1="398" x2="386" y2="456"
        stroke="rgba(255,255,255,0.08)" stroke-width="5" stroke-linecap="round"/>

  <!-- Ring shadow -->
  <circle cx="196" cy="312" r="124" fill="rgba(0,0,0,0.32)"/>
  <!-- Ring outer dark rim -->
  <circle cx="193" cy="309" r="121" fill="none" stroke="#0f172a" stroke-width="8"/>
  <!-- Ring body — thicker chrome -->
  <circle cx="193" cy="309" r="117" fill="none"
          stroke="url(#ringGrad)" stroke-width="46"/>
  <!-- Ring highlight arc — brighter, more visible -->
  <circle cx="193" cy="309" r="117" fill="none"
          stroke="url(#ringHL)" stroke-width="22"
          stroke-dasharray="185 554" stroke-dashoffset="0"
          stroke-linecap="round"/>
  <!-- Second subtle highlight (lower) -->
  <circle cx="193" cy="309" r="117" fill="none"
          stroke="rgba(255,255,255,0.12)" stroke-width="8"
          stroke-dasharray="80 660" stroke-dashoffset="-280"
          stroke-linecap="round"/>
  <!-- Inner dark edge -->
  <circle cx="193" cy="309" r="94" fill="none" stroke="#0f172a" stroke-width="4"/>

  <!-- Lens glass -->
  <circle cx="193" cy="309" r="91" fill="url(#lensGlass)"/>
  <!-- Subtle dark vignette inside lens -->
  <radialGradient id="lensVignette" cx="50%" cy="50%" r="50%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
  </radialGradient>
  <circle cx="193" cy="309" r="91" fill="url(#lensVignette)"/>

  <!-- Traces magnified inside lens -->
  <clipPath id="lensClip">
    <circle cx="193" cy="309" r="90"/>
  </clipPath>
  <g clip-path="url(#lensClip)">
    <!-- Magnified traces — bolder, more visible -->
    <path d="M136,268 Q170,304 220,348" fill="none"
          stroke="#fde68a" stroke-width="7" stroke-linecap="round"
          stroke-dasharray="15,9" filter="url(#glow)" opacity="0.92"/>
    <path d="M122,284 Q158,320 208,364" fill="none"
          stroke="rgba(253,230,138,0.6)" stroke-width="4.5" stroke-linecap="round"
          stroke-dasharray="11,11"/>
    <path d="M150,256 Q184,292 234,336" fill="none"
          stroke="rgba(251,191,36,0.42)" stroke-width="3.5" stroke-linecap="round"
          stroke-dasharray="9,12"/>
    <!-- Magnified dots — larger -->
    <circle cx="148" cy="278" r="10" fill="#fde68a" opacity="0.9" filter="url(#glow)"/>
    <circle cx="174" cy="304" r="9" fill="#fbbf24" opacity="0.78" filter="url(#glow)"/>
    <circle cx="200" cy="328" r="7.5" fill="#f59e0b" opacity="0.62" filter="url(#softGlow)"/>
    <!-- Lens glare inside -->
    <ellipse cx="152" cy="262" rx="30" ry="13"
             fill="rgba(255,255,255,0.22)" transform="rotate(-32,152,262)"/>
  </g>

  <!-- Glass outer glare arc — brighter -->
  <path d="M110,248 a102,102,0,0,1,96,-38"
        fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="8"
        stroke-linecap="round"/>
  <!-- Second subtle glare -->
  <path d="M126,260 a90,90,0,0,1,60,-28"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"
        stroke-linecap="round"/>
</svg>
